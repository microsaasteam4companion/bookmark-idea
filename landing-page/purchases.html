    .mobile-menu { position:fixed; top:0; right:-100%; width:280px; height:100vh; background:#1c1c23; z-index:245; padding:80px 32px; transition:0.4s; border-left:1px solid rgba(255,255,255,0.07); display:flex; flex-direction:column; gap:24px; box-shadow:-10px 0 30px rgba(0,0,0,0.5); }

  <div class="container">
  <p class="subtitle">Manage your CtrlSense Pro license keys and purchase history.</p>

  <!-- Not Logged In -->
  <div id="login-prompt" class="login-prompt">
    <h2>Sign in to view your purchases</h2>
    <p>You need to be logged in to see your license keys and purchase history.</p>
    <button class="login-btn" id="google-login-btn">Sign in with Google</button>
  </div>

  <!-- Logged In -->
  <div id="dashboard" style="display: none;">
    <div class="user-bar" id="user-bar">
      <img id="dash-avatar" src="" alt="User">
      <div class="user-bar-info">
        <h3 id="dash-name"></h3>
        <p id="dash-email"></p>
      </div>
      <button class="signout-link" onclick="firebase.auth().signOut()">Sign Out</button>
    </div>

    <div id="purchases-list">
      <div class="empty-state">
        <h3>Loading purchases...</h3>
      </div>
    </div>
  </div>

  <div class="back-link">
    <a href="./">← Back to Home</a>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <!-- Load External Config -->
  <script src="firebase-config.js"></script>

  <script>
    // Initialized from firebase-config.js
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const loginPrompt = document.getElementById('login-prompt');
    const dashboard = document.getElementById('dashboard');

    // Google Login on purchases page
    document.getElementById('google-login-btn').addEventListener('click', () => {
      auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())
        .catch(e => alert(e.message));
    });

    // Auth state
    auth.onAuthStateChanged((user) => {
      if (user) {
        loginPrompt.style.display = 'none';
        dashboard.style.display = 'block';

        document.getElementById('dash-avatar').src = user.photoURL || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(user.displayName || user.email) + '&background=7c3aed&color=fff&size=80';
        document.getElementById('dash-name').textContent = user.displayName || user.email.split('@')[0];
        document.getElementById('dash-email').textContent = user.email;

        // Check for payment redirect parameters (Dodo Payments)
        const urlParams = new URLSearchParams(window.location.search);
        
        // Dodo Payments can send payment_id, checkout_id, or session_id
        const status = urlParams.get('status') || urlParams.get('checkout_status');
        const paymentId = urlParams.get('payment_id') || urlParams.get('checkout_id') || urlParams.get('checkout_session_id') || urlParams.get('session_id');
        const licenseKey = urlParams.get('license_key');
        
        console.log('Payment Redirect Check:', { status, paymentId, licenseKey, allParams: Object.fromEntries(urlParams) });

        if (paymentId && (status === 'succeeded' || status === 'completed' || !status)) {
          // Visual feedback
          const list = document.getElementById('purchases-list');
          list.innerHTML = `<div class="empty-state"><h3>✨ Finalizing your Pro Upgrade...</h3><p>Please wait a moment while we secure your license key.</p></div>`;
          
          console.log('Valid payment detected, recording to Firestore...');
          
          // Fallback license key if missing from URL
          const finalLicenseKey = licenseKey || 'PRO-' + Math.random().toString(36).substr(2, 9).toUpperCase();
          
          const purchaseData = {
            uid: user.uid,
            paymentId: paymentId,
            licenseKey: finalLicenseKey,
            amount: urlParams.get('amount') || '399',
            currency: urlParams.get('currency') || 'INR',
            status: 'active',
            source: 'dodo_payments',
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          };

          db.collection('purchases').doc(paymentId).set(purchaseData).then(() => {
            console.log('Purchase recorded successfully:', paymentId);
            // Remove params from URL to avoid double-processing
            const cleanUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
            window.history.replaceState({ path: cleanUrl }, '', cleanUrl);
            
            alert('🎉 Congratulations! Your CtrlSense Pro license has been activated.');
            loadPurchases(user.uid);
          }).catch(err => {
            console.error('Error recording purchase:', err);
            loadPurchases(user.uid);
          });
        } else if (urlParams.has('status') && urlParams.get('status') !== 'succeeded') {
           console.warn('Payment not successful or cancelled:', status);
           loadPurchases(user.uid);
        } else {
          loadPurchases(user.uid);
        }
      } else {
        loginPrompt.style.display = 'block';
        dashboard.style.display = 'none';
      }
    });

    function loadPurchases(uid) {
      const list = document.getElementById('purchases-list');

      // Removed .orderBy() to avoid requiring a composite index in Firestore
      db.collection('purchases').where('uid', '==', uid).get()
        .then(snapshot => {
          if (snapshot.empty) {
            list.innerHTML = `
              <div class="empty-state">
                <h3>No purchases yet</h3>
                <p>When you upgrade to Pro, your license key and receipt will appear here.</p>
                <a href="index.html#download" style="color: #a78bfa; font-size: 14px;">← Explore CtrlSense Pro</a>
              </div>`;
            return;
          }

          let purchases = [];
          snapshot.forEach(doc => purchases.push(doc.data()));
          
          // Sort locally by createdAt descending
          purchases.sort((a, b) => {
            const timeA = a.createdAt?.seconds || 0;
            const timeB = b.createdAt?.seconds || 0;
            return timeB - timeA;
          });

          let html = '';
          purchases.forEach(p => {
            const date = p.createdAt ? new Date(p.createdAt.seconds * 1000).toLocaleDateString('en-IN', { year: 'numeric', month: 'short', day: 'numeric' }) : 'N/A';
            const statusClass = p.status === 'active' ? 'status-active' : 'status-pending';

            html += `
              <div class="purchase-card">
                <div class="purchase-info">
                  <h3>CtrlSense Pro License</h3>
                  <p>Purchased on ${date} · ${p.currency || 'INR'} ${p.amount || '399'}</p>
                  <span class="status-badge ${statusClass}">${p.status || 'active'}</span>
                </div>
                <div class="purchase-key">
                  <span>${p.licenseKey || '—'}</span>
                  <button class="copy-btn" onclick="copyKey('${p.licenseKey || ''}')" title="Copy key">📋</button>
                </div>
              </div>`;
          });

          list.innerHTML = html;
        })
        .catch(err => {
          console.error('Firestore error:', err);
          list.innerHTML = `<div class="empty-state"><h3>No purchases yet</h3><p>When you upgrade to Pro, your license key will appear here.</p></div>`;
        });
    }

    function copyKey(key) {
      navigator.clipboard.writeText(key).then(() => {
        alert('License key copied to clipboard!');
      });
    }
  </script>

  </div> <!-- End Container -->

  <script>
    const burgerBtn = document.getElementById('burger-btn');
    const mobileMenu = document.getElementById('mobile-menu');
    const mobileOverlay = document.getElementById('mobile-overlay');

    function toggleMenu() {
      mobileMenu.classList.toggle('active');
      mobileOverlay.classList.toggle('active');
      document.body.style.overflow = mobileMenu.classList.contains('active') ? 'hidden' : '';
    }

    if(burgerBtn) burgerBtn.addEventListener('click', toggleMenu);
    if(mobileOverlay) mobileOverlay.addEventListener('click', toggleMenu);
    
    mobileMenu.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        if (mobileMenu.classList.contains('active')) toggleMenu();
      });
    });
  </script>
